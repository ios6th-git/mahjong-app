<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プレイヤー設定</title>

<style>
html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

body{
  display:flex;
  flex-direction:column;
  padding:10px;
  box-sizing:border-box;
}

h2{
  margin:6px 0 8px;
  font-size:22px;
}

.sectionTitle{
  margin:6px 0 8px;
  font-size:22px;
  font-weight:bold;
}

#topButtons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-bottom:6px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#playerList{
  flex:1;
  overflow:auto;
}

.row{
  display:flex;
  align-items:center;
  gap:4px;
  margin-bottom:6px;
  padding:6px;
  border-radius:10px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.inputBox{
  flex:1;
  min-width:0;
  height:48px;
  font-size:20px;
  border-radius:10px;
  border:2px solid transparent;
  padding:6px;
  transition:0.2s;
}

.inputBox.focused{
  border:2px solid #4CAF50;
  box-shadow:0 0 6px rgba(76,175,80,0.6);
}

.inputBox.locked{
  background:#e6ffe6;
  pointer-events:none;
}

.smallBtn{
  width:52px;
  height:48px;
  font-size:14px;
  padding:0;
  flex-shrink:0;
}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

.checkBtn{
  width:44px;
  height:24px;
  border-radius:20px;
  background:#ddd;
  position:relative;
  flex-shrink:0;
}

.checkBtn::after{
  content:"";
  position:absolute;
  top:2px;
  left:2px;
  width:20px;
  height:20px;
  background:#fff;
  border-radius:50%;
  transition:0.2s;
}

.checkBtn.active{
  background:#4CAF50;
}

.checkBtn.active::after{
  left:22px;
}

#chipRateInput{
  width:33%;
  height:48px;
  font-size:20px;
  border-radius:10px;
  border:2px solid transparent;
  padding:6px;
}

#bottomArea button{
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<h2>プレイヤー設定</h2>

<div id="topButtons">
  <button id="addBtn">名前追加</button>
  <button id="resetBtn">プレイヤーリセット</button>
</div>

<div id="playerList"></div>

<hr>

<div class="sectionTitle">チップレート</div>

<input type="text" id="chipRateInput" placeholder="チップレート" inputmode="numeric">

<div id="bottomArea">
  <button id="saveBtn">保存</button>
</div>

<script>

const state = {
  rows: []
};

function createRow(data = {name:"", checked:false, locked:false}){

  const row = document.createElement("div");
  row.className = "row";

  const inp = document.createElement("input");
  inp.className = "inputBox";
  inp.value = data.name;

  const editBtn = document.createElement("button");
  editBtn.className = "smallBtn";

  const delBtn = document.createElement("button");
  delBtn.className = "smallBtn danger";
  delBtn.textContent = "削除";

  const chkBtn = document.createElement("div");
  chkBtn.className = "checkBtn";

  const obj = {row, inp, editBtn, delBtn, chkBtn, ...data};

  function updateUI(){
    inp.value = obj.name;
    inp.readOnly = obj.locked;

    inp.classList.toggle("locked", obj.locked);

    editBtn.textContent = obj.locked ? "編集" : "確定";

    chkBtn.classList.toggle("active", obj.checked);
  }

  inp.addEventListener("input", e=>{
    obj.name = e.target.value;
    updateRegisteredPlayers();
  });

  editBtn.addEventListener("click", ()=>{
    obj.locked = !obj.locked;
    saveLocks();
    updateUI();
  });

  delBtn.addEventListener("click", ()=>{
    if(!confirm("削除しますか？")) return;
    row.remove();
    state.rows = state.rows.filter(r => r !== obj);
    saveLocks();
    updateRegisteredPlayers();
  });

  chkBtn.addEventListener("click", ()=>{
    obj.checked = !obj.checked;
    updateRegisteredPlayers();
    updateUI();
  });

  row.appendChild(inp);
  row.appendChild(editBtn);
  row.appendChild(delBtn);
  row.appendChild(chkBtn);

  document.getElementById("playerList").appendChild(row);

  updateUI();

  state.rows.push(obj);
}

function updateRegisteredPlayers(){
  const selected = state.rows
    .filter(r => r.checked && r.name.trim() !== "")
    .map(r => r.name.trim());

  localStorage.setItem("mahjongPlayers", JSON.stringify(selected));
}

function saveLocks(){
  const locks = state.rows.map(r=>r.locked);
  localStorage.setItem("mahjongPlayerLocks", JSON.stringify(locks));
}

function load(){
  let players = JSON.parse(localStorage.getItem("mahjongPlayers_draft") || "[]");
  let checks  = JSON.parse(localStorage.getItem("mahjongPlayerChecks_draft") || "[]");
  let locks   = JSON.parse(localStorage.getItem("mahjongPlayerLocks") || "[]");

  if(players.length === 0){
    players = ["","","",""];
    checks = [false,false,false,false];
  }

  players.forEach((p,i)=>{
    createRow({
      name:p,
      checked:checks[i] || false,
      locked:locks[i] || false
    });
  });

  document.getElementById("chipRateInput").value =
    localStorage.getItem("mahjongChipRate_draft") || "";
}

document.getElementById("addBtn").onclick = ()=>{
  createRow();
};

document.getElementById("resetBtn").onclick = ()=>{
  if(!confirm("チェックを全て外しますか？")) return;
  state.rows.forEach(r=>{
    r.checked = false;
    r.chkBtn.classList.remove("active");
  });
  updateRegisteredPlayers();
};

document.getElementById("saveBtn").onclick = ()=>{
  const players = state.rows.map(r=>r.name);
  const checks = state.rows.map(r=>r.checked);

  localStorage.setItem("mahjongPlayers_draft", JSON.stringify(players));
  localStorage.setItem("mahjongPlayerChecks_draft", JSON.stringify(checks));
  saveLocks();

  const rate = document.getElementById("chipRateInput").value.trim();
  localStorage.setItem("mahjongChipRate_draft", rate);

  window.location.href = "index.html";
};

window.onload = load;

</script>
</body>
</html>
