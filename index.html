<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

h3{margin:6px 0 8px;font-size:22px;}

.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

th,td{
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
}

tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}

#table th,#table td{height:60px;}

th{
  position:static;
  background:#fff;
}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.nameLocked{
  background:#eee;
  pointer-events:none;
}

td.lockedCell{background:#e6ffe6;}

td.topScore{
  background:#ffcdd2 !important;
}

.rowLine{
  display:flex;
  align-items:center;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

select{
  font-size:20px;
  min-height:48px;
}
</style>
</head>

<body>

<div id="playerButtons">
  <button onclick="goSetting()">設定</button>
  <button onclick="saveHistory()">履歴保存</button>
  <button onclick="goHistory()">履歴</button>
</div>

<div class="card">
  <h3>点数表</h3>
  <table id="table"></table>
</div>

<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>

const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

function saveState(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
  localStorage.setItem("mahjongChips", JSON.stringify(chips));
}

function loadState(){
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
  chips  = JSON.parse(localStorage.getItem("mahjongChips")||"[]");
}

function loadPlayers(){
  const saved = JSON.parse(localStorage.getItem("mahjongPlayers") || "[]");
  players = saved.length ? saved : ["","","",""];

  if(chips.length !== players.length){
    chips = Array(players.length).fill("");
  }

  rounds.forEach(r=>{
    while(r.scores.length < players.length){
      r.scores.push(r.locked?NOT_JOIN:"");
    }
    while(r.scores.length > players.length){
      r.scores.pop();
    }
  });
}

window.onload=()=>{
  loadState();
  loadPlayers();

  if(rounds.length===0){
    addRound();
  }else{
    renderTable();
  }
};

window.addEventListener("focus", ()=>{
  loadPlayers();
  renderTable();
});

function goSetting(){
  saveState();
  window.location.href="player.html";
}
function goHistory(){
  window.location.href="history.html";
}

function saveHistory(){
  const totals = getTotals();
  const rate = getChipRate();

  const chipValues = players.map((_,i)=>{
    if(chips[i]==="±0") return 0;
    const n = Number(chips[i]||0);
    return isNaN(n)?0:n;
  });

  const results = players.map((_,i)=>{
    return totals[i] + chipValues[i]*rate;
  });

  const data = {
    date: new Date().toLocaleString(),
    players: [...players],
    totals: totals,
    chips: chipValues,
    results: results
  };

  let history = JSON.parse(localStorage.getItem("mahjongHistory")||"[]");

  history.push(data);

  if(history.length > 10){
    history.shift();
  }

  localStorage.setItem("mahjongHistory", JSON.stringify(history));

  alert("履歴保存しました");
}

function addRound(){
  rounds.push({
    scores:Array(players.length).fill(""),
    locked:false
  });
  saveState();
  renderTable();
}

function deleteSelectedRound(){
  const sel = document.getElementById("roundDeleteList");
  const i = Number(sel.value);
  if(!confirm((i+1)+"行削除しますか？")) return;

  rounds.splice(i,1);
  saveState();
  renderTable();
}

function resetRounds(){
  const sel = document.getElementById("roundDeleteList");
  const i = Number(sel.value);
  if(!confirm("行リセットしますか？")) return;

  rounds[i].scores=Array(players.length).fill("");
  rounds[i].locked=false;

  saveState();
  renderTable();
}

function resetChips(){
  if(!confirm("チップリセットしますか？")) return;

  chips=Array(players.length).fill("");
  saveState();
  renderTable();
}

function resetAll(){
  if(!confirm("オールリセットしますか？")) return;

  localStorage.removeItem("mahjongRounds");
  localStorage.removeItem("mahjongChips");

  localStorage.setItem("mahjongPlayers", JSON.stringify(["","","",""]));

  players=["","","",""];
  chips=["","","",""];
  rounds=[{scores:["","","",""],locked:false}];

  localStorage.setItem(
    "mahjongPlayerChecks_draft",
    JSON.stringify([false,false,false,false])
  );

  saveState();
  renderTable();
}

/* 以下は元コードそのまま（変更なし） */

function handleAutoFill(ri,i){...}
function handleChipAutoFill(i){...}
function getTotals(){...}
function getChipRate(){...}
function scrollToBottomNames(){...}
function renderTable(){...}

/* 追加処理そのまま */

(function(){ ... })();

</script>
</body>
</html>
