<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  font-size:20px;
  background:#f5f5f5;
}

#topFixed{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  z-index:1000;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  padding:6px;
}

button{
  font-size:20px;
  padding:6px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
}

.danger{background:#ffebee;}

#wrap{
  margin-top:150px;
  height:70vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:2px solid #000;
  height:60px;
  text-align:center;
}

thead th{
  position:sticky;
  top:0;
  background:#fff;
  z-index:5;
}

td:first-child,th:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:6;
}

input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
}

.locked{background:#e6ffe6;}
.rank1 input{background:#ffcccc;}

.totalRow{
  background:#eee;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="topFixed">
  <div id="playerButtons">
    <button onclick="addRound()">行追加</button>
    <button onclick="resetAll()" class="danger">リセット</button>
  </div>
</div>

<div id="wrap">
  <table id="table"></table>
</div>

<script>
const KEYS={
  PLAYERS:"mahjongPlayers",
  CHECKS:"mahjongPlayerChecks_draft",
  ROUNDS:"mahjongRounds"
};

let players=[];
let checks=[];
let rounds=[];

function load(){
  players=JSON.parse(localStorage.getItem(KEYS.PLAYERS)||'["A","B","C","D"]');
  checks=JSON.parse(localStorage.getItem(KEYS.CHECKS)||"[true,true,true,true]");
  rounds=JSON.parse(localStorage.getItem(KEYS.ROUNDS)||"[]");
}

function save(){
  localStorage.setItem(KEYS.ROUNDS,JSON.stringify(rounds));
}

window.onload=()=>{
  load();
  if(rounds.length===0)addRound();
  render();
};

/* ===== 描画 ===== */
function render(){
  const table=document.getElementById("table");
  table.innerHTML="";

  const activeIndex = players.map((p,i)=>checks[i]?i:null).filter(i=>i!==null);

  const thead=document.createElement("thead");
  const trh=document.createElement("tr");
  trh.appendChild(document.createElement("th"));

  activeIndex.forEach(i=>{
    const th=document.createElement("th");
    th.textContent=players[i];
    trh.appendChild(th);
  });

  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody=document.createElement("tbody");

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");

    tr.appendChild(Object.assign(document.createElement("td"),{textContent:ri+1}));

    let nums=activeIndex.map(i=>{
      const n=Number(r.scores[i]);
      return isNaN(n)?null:n;
    });

    let max=Math.max(...nums.filter(n=>n!==null));

    activeIndex.forEach(i=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("locked");
        inp.disabled=true;
        if(Number(r.scores[i])===max){
          td.classList.add("rank1");
        }
      }

      inp.value=r.scores[i]||"";

      inp.onfocus=()=>autoFill(ri,i,activeIndex);

      inp.oninput=e=>{
        r.scores[i]=e.target.value;
        save();
      };

      td.appendChild(inp);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  /* ===== 合計 ===== */
  const totalTr=document.createElement("tr");
  totalTr.className="totalRow";
  totalTr.appendChild(Object.assign(document.createElement("td"),{textContent:"合計"}));

  activeIndex.forEach(i=>{
    let sum=0;
    rounds.forEach(r=>{
      const n=Number(r.scores[i]);
      if(!isNaN(n)) sum+=n;
    });
    totalTr.appendChild(Object.assign(document.createElement("td"),{textContent:sum}));
  });

  tbody.appendChild(totalTr);
  table.appendChild(tbody);
}

/* ===== 自動計算 ===== */
function autoFill(ri,i,active){
  const r=rounds[ri];
  if(r.locked)return;

  let nums=active.map(idx=>{
    const n=Number(r.scores[idx]);
    return isNaN(n)?null:n;
  });

  let filled=nums.filter(n=>n!==null).length;

  if(filled===3){
    const sum=nums.reduce((a,b)=>a+(b||0),0);
    r.scores[i]=-sum;

    active.forEach(idx=>{
      if(r.scores[idx]==="") r.scores[idx]="不参加";
    });

    r.locked=true;
    save();
    render();
  }
}

/* ===== 操作 ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill(""),locked:false});
  save();
  render();
}

function resetAll(){
  if(!confirm("リセット？"))return;
  localStorage.removeItem(KEYS.ROUNDS);
  rounds=[];
  addRound();
}
</script>

</body>
</html>
