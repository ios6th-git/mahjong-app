<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

/* ===== 上部固定 ===== */
#topFixed{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  padding:6px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

/* ===== ヘッダー ===== */
#fixedHeader{
  display:flex;
  justify-content:center; /* ←中央揃え */
  overflow:hidden;
}

#fixedHeader table{
  border-collapse:collapse;
  table-layout:fixed;
}

#fixedHeader th{
  border:2px solid #000;
  height:60px;
  font-weight:bold;
}

/* ===== テーブル ===== */
.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  margin-bottom:10px;
}

#table{
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
}

td{
  border:2px solid #000;
  text-align:center;
  height:60px;
}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:50;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.totalRow{
  background:#eee;
  font-weight:bold;
}

.rowLine{
  display:flex;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}
</style>
</head>

<body>

<div id="topFixed">
  <div id="playerButtons">
    <button onclick="goSetting()">設定</button>
    <button onclick="saveHistory()">履歴保存</button>
    <button onclick="goHistory()">履歴</button>
  </div>
  <div id="fixedHeader"></div>
</div>

<div class="card">
  <div id="tableWrap" style="overflow-y:auto;">
    <table id="table"></table>
  </div>
</div>

<!-- ===== ボタン完全復活 ===== -->
<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>
let players=[];
let rounds=[];

/* ===== 初期 ===== */
window.onload=()=>{
  players = JSON.parse(localStorage.getItem("mahjongPlayers")||'["","","",""]');
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");

  if(rounds.length===0) addRound();
  renderTable();
};

/* ===== ヘッダー ===== */
function renderHeader(){
  const wrap=document.getElementById("fixedHeader");
  wrap.innerHTML="";

  const table=document.createElement("table");
  const tr=document.createElement("tr");

  tr.appendChild(document.createElement("th"));

  players.forEach(p=>{
    const th=document.createElement("th");
    th.textContent=p;
    tr.appendChild(th);
  });

  table.appendChild(tr);
  wrap.appendChild(table);
}

/* ===== 描画 ===== */
function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.value=r.scores[i]||"";
      inp.oninput=e=>{
        r.scores[i]=e.target.value;
        save();
      };

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  /* 合計 */
  const total=document.createElement("tr");
  total.className="totalRow";
  total.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

  players.forEach((_,i)=>{
    let sum=0;
    rounds.forEach(r=>{
      const n=Number(r.scores[i]);
      if(!isNaN(n)) sum+=n;
    });
    total.appendChild(Object.assign(document.createElement("td"),{innerText:sum}));
  });

  table.appendChild(total);

  renderHeader();
  adjustLayout();
  updateSelect();
}

/* ===== セレクト更新 ===== */
function updateSelect(){
  const sel=document.getElementById("roundDeleteList");
  sel.innerHTML="";
  rounds.forEach((_,i)=>{
    const op=document.createElement("option");
    op.value=i;
    op.textContent=(i+1)+"行目";
    sel.appendChild(op);
  });
}

/* ===== レイアウト補正 ===== */
function adjustLayout(){
  const top=document.getElementById("topFixed");
  document.body.style.paddingTop = top.offsetHeight + "px";

  const wrap=document.getElementById("tableWrap");
  const header=document.querySelector("#fixedHeader table");
  const main=document.getElementById("table");

  const scrollBar = wrap.offsetWidth - wrap.clientWidth;

  header.style.width = (main.offsetWidth - scrollBar) + "px";

  const m=main.rows[0].cells;
  const h=header.rows[0].cells;

  for(let i=0;i<m.length;i++){
    h[i].style.width = m[i].offsetWidth+"px";
  }
}

/* ===== 操作 ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill("")});
  save();
  renderTable();
}

function deleteSelectedRound(){
  const i=Number(roundDeleteList.value);
  if(!confirm("削除？")) return;
  rounds.splice(i,1);
  save();
  renderTable();
}

function resetRounds(){
  if(!confirm("行リセット？")) return;
  rounds.forEach(r=>r.scores=Array(players.length).fill(""));
  save();
  renderTable();
}

function resetChips(){
  alert("チップは未実装");
}

function resetAll(){
  if(!confirm("全リセット？")) return;
  localStorage.clear();
  location.reload();
}

function save(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
}

/* ===== 遷移 ===== */
function goSetting(){location.href="player.html";}
function goHistory(){location.href="history.html";}
function saveHistory(){alert("未実装");}
</script>

</body>
</html>
