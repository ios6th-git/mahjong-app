<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

h3{margin:6px 0 8px;font-size:22px;}

.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

th,td{
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
}

tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}

#table th,#table td{height:60px;}

th{position:static;background:#fff;}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.nameLocked{
  background:#eee;
  pointer-events:none;
}

td.lockedCell{background:#e6ffe6;}
td.topScore{background:#ffcdd2 !important;}

/* ★追加：チップ確定 */
td.chipLocked{background:#e6ffe6;}

.rowLine{
  display:flex;
  align-items:center;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

select{
  font-size:20px;
  min-height:48px;
}
</style>
</head>

<body>

<div id="playerButtons">
  <button onclick="goSetting()">設定</button>
  <button onclick="saveHistory()">履歴保存</button>
  <button onclick="goHistory()">履歴</button>
</div>

<div class="card">
  <h3>点数表</h3>
  <table id="table"></table>
</div>

<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>

const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

function saveState(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
  localStorage.setItem("mahjongChips", JSON.stringify(chips));
}

function loadState(){
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
  chips  = JSON.parse(localStorage.getItem("mahjongChips")||"[]");
}

function loadPlayers(){
  const saved = JSON.parse(localStorage.getItem("mahjongPlayers") || "[]");
  players = saved.length ? saved : ["","","",""];

  if(chips.length !== players.length){
    chips = Array(players.length).fill("");
  }

  rounds.forEach(r=>{
    while(r.scores.length < players.length){
      r.scores.push(r.locked?NOT_JOIN:"");
    }
    while(r.scores.length > players.length){
      r.scores.pop();
    }
  });
}

window.onload=()=>{
  loadState();
  loadPlayers();

  if(rounds.length===0){
    addRound();
  }else{
    renderTable();
  }
};

window.addEventListener("focus", ()=>{
  loadPlayers();
  renderTable();
});

function goSetting(){
  saveState();
  window.location.href="player.html";
}
function goHistory(){
  window.location.href="history.html";
}

/* ★表示用フォーマット（ロジック非変更） */
function formatZero(v){
  if(v===0) return "±0";
  return v;
}

function isChipLocked(){
  return chips.every(v => v !== "");
}

function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  const header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  players.forEach((p)=>{
    const th=document.createElement("th");
    const inp=document.createElement("input");
    inp.value=p;
    inp.readOnly=true;
    inp.classList.add("nameLocked");
    th.appendChild(inp);
    header.appendChild(th);
  });
  table.appendChild(header);

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    let max=-Infinity;
    if(r.locked){
      r.scores.forEach(v=>{
        if(v!=="" && v!==NOT_JOIN){
          const n=Number(v);
          if(!isNaN(n)) max=Math.max(max,n);
        }
      });
    }

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      let val=r.scores[i];
      if(val!=="" && val!==NOT_JOIN){
        const n=Number(val);
        if(!isNaN(n)) val=formatZero(n);
      }

      inp.value=(val===NOT_JOIN?"不参加":val);
      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("lockedCell");
        if(Number(r.scores[i])===max){
          td.classList.add("topScore");
        }
        inp.disabled=true;
      }else{
        inp.oninput=e=>{
          const v=e.target.value.trim();
          r.scores[i]=(v==="不参加")?NOT_JOIN:v;
          saveState();
        };
      }

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  const totals=getTotals();
  const rate=getChipRate();

  const tr=document.createElement("tr");
  tr.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

  totals.forEach(v=>{
    const td=document.createElement("td");
    td.innerText=formatZero(v);
    tr.appendChild(td);
  });
  table.appendChild(tr);

  const chipRow=document.createElement("tr");
  chipRow.appendChild(Object.assign(document.createElement("td"),{innerText:"チップ"}));

  players.forEach((_,i)=>{
    const td=document.createElement("td");
    const inp=document.createElement("input");

    let val=chips[i];
    if(val!==""){
      const n=(val==="±0")?0:Number(val);
      val=formatZero(n);
    }

    inp.value=val||"";
    inp.setAttribute("inputmode","numeric");

    inp.oninput=e=>{
      chips[i]=e.target.value;
      saveState();
    };

    if(chips[i] !== ""){
      td.classList.add("chipLocked");
    }

    td.appendChild(inp);
    chipRow.appendChild(td);
  });

  table.appendChild(chipRow);

  const resultRow=document.createElement("tr");
  resultRow.appendChild(Object.assign(document.createElement("td"),{innerText:"結果"}));

  const showResult = isChipLocked();

  players.forEach((_,i)=>{
    const td=document.createElement("td");

    if(showResult){
      const chip = chips[i]==="±0"?0:Number(chips[i]||0);
      td.innerText=formatZero(totals[i] + chip*rate);
    }else{
      td.innerText="";
    }

    resultRow.appendChild(td);
  });

  table.appendChild(resultRow);

  const bottomRow=document.createElement("tr");
  bottomRow.appendChild(document.createElement("td"));

  players.forEach((p)=>{
    const td=document.createElement("td");
    const inp=document.createElement("input");
    inp.value=p;
    inp.readOnly=true;
    inp.classList.add("nameLocked");
    td.appendChild(inp);
    bottomRow.appendChild(td);
  });

  table.appendChild(bottomRow);

  const sel=document.getElementById("roundDeleteList");
  sel.innerHTML="";

  rounds.forEach((_,i)=>{
    const op=document.createElement("option");
    op.value=i;
    op.textContent=(i+1)+"行目";
    sel.appendChild(op);
  });

  if(rounds.length>0){
    sel.value=rounds.length-1;
  }
}

/* ★既存ロジック（そのまま） */
function getTotals(){
  const totals=Array(players.length).fill(0);
  rounds.forEach(r=>{
    players.forEach((_,i)=>{
      const v=r.scores[i];
      if(v!==""&&v!==NOT_JOIN){
        const n=Number(v);
        if(!isNaN(n)) totals[i]+=n;
      }
    });
  });
  return totals;
}

function getChipRate(){
  const n=Number(localStorage.getItem("mahjongChipRate_draft")||0);
  return isNaN(n)?0:n;
}
</script>
</body>
</html>
