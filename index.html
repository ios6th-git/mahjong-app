<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
  padding-top:110px;
}

h3{margin:6px 0 8px;font-size:22px;}

.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

th,td{
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
}

tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}

#table td{height:60px;}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:50;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.nameLocked{
  background:#eee;
  pointer-events:none;
}

td.lockedCell{background:#e6ffe6;}

.rank1 input{
  background:#ffcccc;
}

/* 固定ヘッダー */
#fixedHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#fixedHeaderTitle{
  font-size:22px;
  padding:6px 10px;
}

#fixedHeader table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

#fixedHeader th{
  height:60px;
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  background:#fff;
}

#fixedHeader th:first-child{
  border-left:2px solid #000;
}

/* レイアウト */
.rowLine{
  display:flex;
  align-items:center;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

select{
  font-size:20px;
  min-height:48px;
}
</style>
</head>

<body>

<div id="fixedHeader">
  <div id="fixedHeaderTitle">点数表</div>
  <div id="fixedHeaderTable"></div>
</div>

<div id="playerButtons">
  <button onclick="goSetting()">設定</button>
  <button onclick="saveHistory()">履歴保存</button>
  <button onclick="goHistory()">履歴</button>
</div>

<div class="card">
  <h3>点数表</h3>
  <table id="table"></table>
</div>

<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>

const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

function saveState(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
  localStorage.setItem("mahjongChips", JSON.stringify(chips));
}

function loadState(){
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
  chips  = JSON.parse(localStorage.getItem("mahjongChips")||"[]");
}

function loadPlayers(){
  const saved = JSON.parse(localStorage.getItem("mahjongPlayers") || "[]");
  players = saved.length ? saved : ["","","",""];

  if(chips.length !== players.length){
    chips = Array(players.length).fill("");
  }

  rounds.forEach(r=>{
    while(r.scores.length < players.length){
      r.scores.push(r.locked?NOT_JOIN:"");
    }
    while(r.scores.length > players.length){
      r.scores.pop();
    }
  });
}

window.onload=()=>{
  loadState();
  loadPlayers();
  if(rounds.length===0) addRound();
  else renderTable();
};

window.addEventListener("focus", ()=>{
  loadPlayers();
  renderTable();
});

function goSetting(){
  saveState();
  window.location.href="player.html";
}
function goHistory(){
  window.location.href="history.html";
}

/* ===== ヘッダー ===== */
function renderHeader(){
  const wrap=document.getElementById("fixedHeaderTable");
  wrap.innerHTML="";

  const table=document.createElement("table");
  const tr=document.createElement("tr");

  tr.appendChild(document.createElement("th"));

  players.forEach(p=>{
    const th=document.createElement("th");
    th.innerText=p;
    tr.appendChild(th);
  });

  table.appendChild(tr);
  wrap.appendChild(table);
}

/* ===== 自動スクロール ===== */
function scrollToInput(el){
  const y = el.getBoundingClientRect().top + window.scrollY;
  const offset = 130;
  window.scrollTo({
    top: y - offset,
    behavior: "smooth"
  });
}

/* ===== メイン描画 ===== */
function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    let max = -Infinity;
    r.scores.forEach(v=>{
      if(v!=="" && v!==NOT_JOIN){
        const n = Number(v);
        if(!isNaN(n)) max = Math.max(max,n);
      }
    });

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.value=(r.scores[i]===NOT_JOIN?"不参加":r.scores[i]);
      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("lockedCell");
        inp.disabled=true;
        if(Number(r.scores[i]) === max) td.classList.add("rank1");
      }else{
        inp.onfocus=(e)=>{
          scrollToInput(e.target);
          handleAutoFill(ri,i);
        };
        inp.onclick=()=>handleAutoFill(ri,i);
        inp.oninput=e=>{
          const val=e.target.value.trim();
          r.scores[i]=(val==="不参加")?NOT_JOIN:val;
          saveState();
        };
      }

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  renderHeader();
}

/* ===== ロジック ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill(""),locked:false});
  saveState();
  renderTable();
}

function deleteSelectedRound(){
  const i=Number(roundDeleteList.value);
  if(!confirm((i+1)+"行削除しますか？")) return;
  rounds.splice(i,1);
  saveState();
  renderTable();
}

function resetRounds(){
  const i=Number(roundDeleteList.value);
  if(!confirm("リセットしますか？")) return;
  rounds[i].scores=Array(players.length).fill("");
  rounds[i].locked=false;
  saveState();
  renderTable();
}

function resetChips(){
  if(!confirm("チップリセットしますか？")) return;
  chips=Array(players.length).fill("");
  saveState();
  renderTable();
}

function resetAll(){
  if(!confirm("全リセットしますか？")) return;

  localStorage.removeItem("mahjongRounds");
  localStorage.removeItem("mahjongChips");

  localStorage.setItem("mahjongPlayers", JSON.stringify(["","","",""]));

  players=["","","",""];
  chips=["","","",""];
  rounds=[{scores:["","","",""],locked:false}];

  localStorage.setItem(
    "mahjongPlayerChecks_draft",
    JSON.stringify([false,false,false,false])
  );

  saveState();
  renderTable();
}

function handleAutoFill(ri,i){
  const r=rounds[ri];
  if(r.locked) return;

  const nums=r.scores.map(v=>{
    if(v===""||v===NOT_JOIN) return null;
    const n=Number(v);
    return isNaN(n)?null:n;
  });

  const filled=nums.map((v,i)=>v!==null?i:-1).filter(i=>i!==-1);

  if(filled.length===3 && r.scores[i]===""){
    const sum=filled.reduce((a,j)=>a+nums[j],0);
    r.scores[i]=-sum;

    for(let k=0;k<players.length;k++){
      if(r.scores[k]==="") r.scores[k]=NOT_JOIN;
    }

    r.locked=true;
    saveState();
    renderTable();
  }
}

</script>
</body>
</html>
