<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

h3{margin:6px 0 8px;font-size:22px;}

.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

th,td{
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
}

tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}

#table th,#table td{height:60px;}

th{
  position:sticky;
  top:0;
  background:#fff;
  z-index:2;
}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.nameLocked{
  background:#eee;
  pointer-events:none;
}

td.lockedCell{background:#e6ffe6;}

/* ★追加：1位ハイライト */
.firstPlace{
  background:#ffe5e5 !important;
}

/* レイアウト */
.rowLine{
  display:flex;
  align-items:center;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

select{
  font-size:20px;
  min-height:48px;
}
</style>
</head>

<body>

<div id="playerButtons">
  <button onclick="goSetting()">設定</button>
  <button onclick="saveHistory()">履歴保存</button>
  <button onclick="goHistory()">履歴</button>
</div>

<div class="card">
  <h3>点数表</h3>
  <table id="table"></table>
</div>

<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>

const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

/* ★表示変換専用（ロジック非干渉） */
function displayScore(v){
  if(v===0 || v==="0") return "±0";
  return v;
}

function saveState(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
  localStorage.setItem("mahjongChips", JSON.stringify(chips));
}

function loadState(){
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
  chips  = JSON.parse(localStorage.getItem("mahjongChips")||"[]");
}

function loadPlayers(){
  const saved = JSON.parse(localStorage.getItem("mahjongPlayers") || "[]");
  players = saved.length ? saved : ["","","",""];

  if(chips.length !== players.length){
    chips = Array(players.length).fill("");
  }

  rounds.forEach(r=>{
    while(r.scores.length < players.length){
      r.scores.push(r.locked?NOT_JOIN:"");
    }
    while(r.scores.length > players.length){
      r.scores.pop();
    }
  });
}

window.onload=()=>{
  loadState();
  loadPlayers();

  if(rounds.length===0){
    addRound();
  }else{
    renderTable();
  }
};

window.addEventListener("focus", ()=>{
  loadPlayers();
  renderTable();
});

/* 既存ロジック一切変更なし */

function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  const header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  players.forEach((p,i)=>{
    const th=document.createElement("th");
    const inp=document.createElement("input");
    inp.value=p;
    inp.readOnly=true;
    inp.classList.add("nameLocked");
    th.appendChild(inp);
    header.appendChild(th);
  });
  table.appendChild(header);

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    /* ★順位判定（表示専用） */
    let max = -Infinity;
    if(r.locked){
      r.scores.forEach(v=>{
        const n=Number(v);
        if(!isNaN(n)) max=Math.max(max,n);
      });
    }

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      let raw = r.scores[i];
      let display = (raw===NOT_JOIN?"不参加":displayScore(raw));
      inp.value = display;

      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("lockedCell");
        inp.disabled=true;

        /* ★1位ハイライト */
        if(Number(raw)===max){
          td.classList.add("firstPlace");
        }

      }else{
        inp.onfocus=()=>handleAutoFill(ri,i);
        inp.onclick=()=>handleAutoFill(ri,i);
        inp.oninput=e=>{
          const val=e.target.value.trim();
          r.scores[i]=(val==="不参加")?NOT_JOIN:val;
          saveState();
        };
      }

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  const totals=getTotals();
  const rate=getChipRate();

  const tr=document.createElement("tr");
  tr.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

  totals.forEach(v=>{
    const td=document.createElement("td");
    td.innerText=displayScore(v);
    tr.appendChild(td);
  });
  table.appendChild(tr);

  const chipRow=document.createElement("tr");
  chipRow.appendChild(Object.assign(document.createElement("td"),{innerText:"チップ"}));

  players.forEach((_,i)=>{
    const td=document.createElement("td");
    const inp=document.createElement("input");

    inp.value=chips[i]||"";
    inp.setAttribute("inputmode","numeric");

    inp.onfocus=()=>handleChipAutoFill(i);
    inp.onclick=()=>handleChipAutoFill(i);

    inp.oninput=e=>{
      chips[i]=e.target.value;
      saveState();
    };

    td.appendChild(inp);
    chipRow.appendChild(td);
  });

  table.appendChild(chipRow);

  const resultRow=document.createElement("tr");
  resultRow.appendChild(Object.assign(document.createElement("td"),{innerText:"結果"}));

  players.forEach((_,i)=>{
    const td=document.createElement("td");
    const chip = chips[i]==="±0"?0:Number(chips[i]||0);
    const val = totals[i] + chip*rate;

    td.innerText = displayScore(val); /* ★ここだけ表示変換 */

    resultRow.appendChild(td);
  });

  table.appendChild(resultRow);

  const sel=document.getElementById("roundDeleteList");
  sel.innerHTML="";

  rounds.forEach((_,i)=>{
    const op=document.createElement("option");
    op.value=i;
    op.textContent=(i+1)+"行目";
    sel.appendChild(op);
  });

  if(rounds.length>0){
    sel.value=rounds.length-1;
  }
}

</script>
</body>
</html>
