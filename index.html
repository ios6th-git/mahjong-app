<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-size:20px;font-family:sans-serif;background:#f5f5f5;padding:10px;}
h3{margin:6px 0 8px;font-size:22px;}
.card{background:#fff;border-radius:10px;padding:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:10px;}
button{font-size:20px;min-height:48px;padding:4px;border:none;border-radius:10px;background:#e8f5e9;color:#2e7d32;}
button:active{transform:scale(0.96);}
.danger{background:#ffebee;color:#d32f2f;}
#playerButtons{display:flex;justify-content:flex-end;gap:6px;margin-bottom:6px;}
table{width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0;}
th,td{border:2px solid #000;text-align:center;}
input{width:100%;height:100%;font-size:20px;border:none;text-align:center;}
td.topScore{background:#ffcdd2;}
td.lockedCell{background:#e6ffe6;}
</style>
</head>

<body>

<div id="playerButtons">
<button onclick="saveHistory()">履歴保存</button>
</div>

<div class="card">
<h3>点数表</h3>
<table id="table"></table>
</div>

<div class="card">
<button onclick="addRound()">行追加</button>
<button onclick="resetAll()">オールリセット</button>
</div>

<script>

const NOT_JOIN="__NO__";
let players=["A","B","C","D"];
let rounds=[];
let chips=["","","",""];

// ===== 共通処理 =====

// 数値変換（安全）
function toNum(v){
  if(v==="") return null;
  if(v==="±0") return 0;
  const n=Number(v);
  return isNaN(n)?null:n;
}

// 表示変換
function toDisplay(v){
  if(v==="") return "";
  const n=Number(v);
  if(!isNaN(n) && n===0) return "±0";
  return v;
}

// 入力制限（数字＋先頭-）
function sanitize(v){
  v = v.replace(/[^0-9\-]/g,"");
  if(v.indexOf("-")>0){
    v = v.replace(/-/g,"");
  }
  return v;
}

// チップ入力完了判定
function chipsFilled(){
  return chips.every(v=>v!=="");
}

// ===== メイン描画 =====

function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  // ヘッダー
  const head=document.createElement("tr");
  head.appendChild(document.createElement("th"));
  players.forEach(p=>{
    const th=document.createElement("th");
    th.innerText=p;
    head.appendChild(th);
  });
  table.appendChild(head);

  // ラウンド
  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    let max=-Infinity;
    r.scores.forEach(v=>{
      const n=toNum(v);
      if(n!==null) max=Math.max(max,n);
    });

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.value=toDisplay(r.scores[i]||"");
      inp.setAttribute("inputmode","numeric");
      inp.dataset.type="score";
      inp.dataset.ri=ri;
      inp.dataset.i=i;

      const n=toNum(r.scores[i]);
      if(n!==null && n===max){
        td.classList.add("topScore");
      }

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  // 合計
  const totals=Array(players.length).fill(0);
  rounds.forEach(r=>{
    r.scores.forEach((v,i)=>{
      const n=toNum(v);
      if(n!==null) totals[i]+=n;
    });
  });

  const totalRow=document.createElement("tr");
  totalRow.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));
  totals.forEach(v=>{
    const td=document.createElement("td");
    td.innerText = v===0 ? "" : toDisplay(v);
    totalRow.appendChild(td);
  });
  table.appendChild(totalRow);

  // チップ
  const chipRow=document.createElement("tr");
  chipRow.appendChild(Object.assign(document.createElement("td"),{innerText:"チップ"}));

  players.forEach((_,i)=>{
    const td=document.createElement("td");
    const inp=document.createElement("input");

    inp.value=toDisplay(chips[i]||"");
    inp.setAttribute("inputmode","numeric");
    inp.dataset.type="chip";
    inp.dataset.i=i;

    td.appendChild(inp);
    chipRow.appendChild(td);
  });

  table.appendChild(chipRow);

  // 結果
  const resultRow=document.createElement("tr");
  resultRow.appendChild(Object.assign(document.createElement("td"),{innerText:"結果"}));

  players.forEach((_,i)=>{
    const td=document.createElement("td");

    if(chipsFilled()){
      const val = totals[i] + (toNum(chips[i])||0);
      td.innerText = val===0 ? "±0" : val;
    }else{
      td.innerText="";
    }

    resultRow.appendChild(td);
  });

  table.appendChild(resultRow);
}

// ===== イベント（1回だけ） =====

document.addEventListener("input",(e)=>{
  const t=e.target;
  if(t.tagName!=="INPUT") return;

  let v=sanitize(t.value);
  t.value=v;

  if(t.dataset.type==="score"){
    rounds[t.dataset.ri].scores[t.dataset.i]=v;
  }

  if(t.dataset.type==="chip"){
    chips[t.dataset.i]=v;
  }

  renderTable();
});

// ===== 操作 =====

function addRound(){
  rounds.push({scores:["","","",""]});
  renderTable();
}

function resetAll(){
  rounds=[];
  chips=["","","",""];
  renderTable();
}

function saveHistory(){
  alert("保存（ダミー）");
}

// 初期
addRound();

</script>
</body>
</html>
