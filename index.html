<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-size:20px;font-family:sans-serif;background:#f5f5f5;padding:10px;}
h3{margin:6px 0 8px;font-size:22px;}
.card{background:#fff;border-radius:10px;padding:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:10px;}
button{font-size:20px;min-height:48px;padding:4px;border:none;border-radius:10px;background:#e8f5e9;color:#2e7d32;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
button:active{transform:scale(0.96);}
.danger{background:#ffebee;color:#d32f2f;}
#playerButtons{display:flex;justify-content:flex-end;gap:6px;margin-bottom:6px;}
table{width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0;}
th,td{border-right:2px solid #000;border-bottom:2px solid #000;text-align:center;}
tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}
#table th,#table td{height:60px;}
input{width:100%;height:100%;font-size:20px;border:none;text-align:center;}
.nameLocked{background:#eee;pointer-events:none;}
td.lockedCell{background:#e6ffe6;}
td.topScore{background:#ffcdd2 !important;}
.rowLine{display:flex;align-items:center;margin-top:6px;gap:6px;}
.left{justify-content:flex-start;}
.right{justify-content:flex-end;}
select{font-size:20px;min-height:48px;}
</style>
</head>

<body>

<div id="playerButtons">
<button onclick="goSetting()">設定</button>
<button onclick="saveHistory()">履歴保存</button>
<button onclick="goHistory()">履歴</button>
</div>

<div class="card">
<h3>点数表</h3>
<table id="table"></table>
</div>

<div class="card">
<div class="rowLine left">
<button onclick="addRound()">行追加</button>
</div>
<div class="rowLine right">
<select id="roundDeleteList"></select>
<button onclick="deleteSelectedRound()">選択行削除</button>
</div>
<div class="rowLine right">
<button onclick="resetRounds()">行リセット</button>
<button onclick="resetChips()">チップリセット</button>
</div>
<div class="rowLine right">
<button class="danger" onclick="resetAll()">オールリセット</button>
</div>
</div>

<script>
const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

const ui={
rows:[],
totalCells:[],
chipInputs:[],
resultCells:[],
select:document.getElementById("roundDeleteList"),
table:document.getElementById("table")
};

window.onload=()=>{
load();
init();
setupInputBehavior(); // ★入力仕様ここで有効化
};

window.addEventListener("focus",()=>{
loadPlayers();
refreshAll();
});

/* ===== データ ===== */
function load(){
rounds=JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
chips=JSON.parse(localStorage.getItem("mahjongChips")||"[]");
loadPlayers();

if(rounds.length===0){
rounds.push({scores:Array(players.length).fill(""),locked:false});
}
}

function loadPlayers(){
const saved=JSON.parse(localStorage.getItem("mahjongPlayers")||"[]");
players=saved.length?saved:["","","",""];

if(chips.length!==players.length){
chips=Array(players.length).fill("");
}
}

function save(){
localStorage.setItem("mahjongRounds",JSON.stringify(rounds));
localStorage.setItem("mahjongChips",JSON.stringify(chips));
}

/* ===== 初期DOM ===== */
function init(){
createHeader();
rounds.forEach((r,i)=>createRound(i));
createTotalRow();
createChipRow();
createResultRow();
createBottomNames();
updateSelect();
refreshAll();
}

/* ===== ヘッダ ===== */
function createHeader(){
const tr=document.createElement("tr");
tr.appendChild(document.createElement("th"));

players.forEach(p=>{
const th=document.createElement("th");
const inp=document.createElement("input");
inp.value=p;
inp.readOnly=true;
inp.className="nameLocked";
th.appendChild(inp);
tr.appendChild(th);
});

ui.table.appendChild(tr);
}

/* ===== ラウンド ===== */
function createRound(i){
const r=rounds[i];
const tr=document.createElement("tr");

tr.appendChild(Object.assign(document.createElement("td"),{innerText:i+1}));

const row={cells:[]};

players.forEach((_,pi)=>{
const td=document.createElement("td");
const inp=document.createElement("input");

inp.setAttribute("inputmode","numeric");

inp.addEventListener("input",e=>{
r.scores[pi]=normalize(e.target.value);
autoFill(i,pi);
save();
refreshAll();
});

inp.addEventListener("focus",()=>{
autoFill(i,pi);
scrollToBottomNames();
});

inp.addEventListener("click",()=>{
autoFill(i,pi);
scrollToBottomNames();
});

td.appendChild(inp);
tr.appendChild(td);
row.cells.push({td,inp});
});

ui.table.appendChild(tr);
ui.rows.push(row);
}

/* ===== normalize ===== */
function normalize(v){
if(v==="不参加") return NOT_JOIN;
v=v.replace(/[^0-9\-]/g,"");
if(v.indexOf("-")>0) v=v.replace(/-/g,"");
return v;
}

/* ===== autoFill ===== */
function autoFill(ri,i){
const r=rounds[ri];
if(r.locked) return;

const nums=r.scores.map(v=>{
if(v===""||v===NOT_JOIN)return null;
const n=Number(v);
return isNaN(n)?null:n;
});

const filled=nums.map((v,i)=>v!==null?i:-1).filter(i=>i!==-1);

if(filled.length===players.length-1 && r.scores[i]===""){
const sum=filled.reduce((a,j)=>a+nums[j],0);
r.scores[i]=-sum;

for(let k=0;k<players.length;k++){
if(r.scores[k]==="") r.scores[k]=NOT_JOIN;
}

r.locked=true;
save();
}
}

/* ===== チップ ===== */
function createChipRow(){
const tr=document.createElement("tr");
tr.appendChild(Object.assign(document.createElement("td"),{innerText:"チップ"}));

players.forEach((_,i)=>{
const td=document.createElement("td");
const inp=document.createElement("input");

inp.setAttribute("inputmode","numeric");

inp.addEventListener("input",e=>{
chips[i]=normalize(e.target.value);
chipAutoFill(i);
save();
refreshAll();
});

inp.addEventListener("focus",()=>{
chipAutoFill(i);
scrollToBottomNames();
});

inp.addEventListener("click",()=>{
chipAutoFill(i);
scrollToBottomNames();
});

td.appendChild(inp);
tr.appendChild(td);
ui.chipInputs.push(inp);
});

ui.table.appendChild(tr);
}

/* ===== チップautoFill ===== */
function chipAutoFill(i){
const nums=chips.map(v=>{
if(v==="") return null;
const n=Number(v);
return isNaN(n)?null:n;
});

const filled=nums.map((v,i)=>v!==null?i:-1).filter(i=>i!==-1);

if(filled.length===players.length-1 && chips[i]===""){
const sum=filled.reduce((a,j)=>a+nums[j],0);
chips[i]=String(-sum);
save();
}
}

/* ===== 合計 ===== */
function createTotalRow(){
const tr=document.createElement("tr");
tr.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

players.forEach(()=>{
const td=document.createElement("td");
ui.totalCells.push(td);
tr.appendChild(td);
});

ui.table.appendChild(tr);
}

/* ===== 結果 ===== */
function createResultRow(){
const tr=document.createElement("tr");
tr.appendChild(Object.assign(document.createElement("td"),{innerText:"結果"}));

players.forEach(()=>{
const td=document.createElement("td");
ui.resultCells.push(td);
tr.appendChild(td);
});

ui.table.appendChild(tr);
}

/* ===== 下名前 ===== */
function createBottomNames(){
const tr=document.createElement("tr");
tr.id="bottomNamesRow";
tr.appendChild(document.createElement("td"));

players.forEach(p=>{
const td=document.createElement("td");
const inp=document.createElement("input");
inp.value=p;
inp.readOnly=true;
inp.className="nameLocked";
td.appendChild(inp);
tr.appendChild(td);
});

ui.table.appendChild(tr);
}

/* ===== 更新 ===== */
function refreshAll(){
ui.rows.forEach((r,i)=>{
const data=rounds[i];

let max=-Infinity;
if(data.locked){
data.scores.forEach(v=>{
if(v!==""&&v!==NOT_JOIN){
const n=Number(v);
if(!isNaN(n)) max=Math.max(max,n);
}
});
}

r.cells.forEach((c,j)=>{
let v=data.scores[j];
c.inp.value=(v===NOT_JOIN?"不参加":v||"");

c.td.classList.toggle("lockedCell",data.locked);
c.inp.disabled=data.locked;
c.td.classList.toggle("topScore",Number(v)===max && data.locked);
});
});

ui.chipInputs.forEach((inp,i)=>{
inp.value=chips[i]||"";
});

updateTotals();
controlResult();
}

/* ===== 合計計算 ===== */
function updateTotals(){
const totals=Array(players.length).fill(0);

rounds.forEach(r=>{
r.scores.forEach((v,i)=>{
if(v!==""&&v!==NOT_JOIN){
const n=Number(v);
if(!isNaN(n)) totals[i]+=n;
}
});
});

totals.forEach((v,i)=>{
ui.totalCells[i].innerText=v;
});

const rate=Number(localStorage.getItem("mahjongChipRate_draft")||0);

totals.forEach((v,i)=>{
const chip = Number(chips[i]||0);
ui.resultCells[i].innerText=v + chip*rate;
});
}

/* ===== 結果欄制御 ===== */
function controlResult(){
const filled=ui.chipInputs.every(inp=>inp.value!==""&&inp.value!=null);

if(!filled){
ui.resultCells.forEach(td=>td.innerText="");
}
}

/* ===== スクロール ===== */
function scrollToBottomNames(){
setTimeout(()=>{
const el=document.getElementById("bottomNamesRow");
if(el) el.scrollIntoView({block:"end"});
},300);
}

/* ===== 入力制限（元仕様） ===== */
function setupInputBehavior(){
document.addEventListener("input",function(e){
const t=e.target;
if(t.tagName!=="INPUT") return;
if(!t.closest("#table")) return;

let v=t.value;
if(v==="不参加") return;
if(v==="") return;

v=v.replace(/[^0-9\-]/g,"");
if(v.indexOf("-")>0){
v=v.replace(/-/g,"");
}
t.value=v;
});
}

/* ===== 操作 ===== */
function addRound(){
const i=rounds.length;
rounds.push({scores:Array(players.length).fill(""),locked:false});
createRound(i);
updateSelect();
save();
refreshAll();
}

function deleteSelectedRound(){
const i=Number(ui.select.value);
if(!confirm("削除しますか？")) return;

rounds.splice(i,1);
ui.rows[i].cells[0].td.parentElement.remove();
ui.rows.splice(i,1);

updateSelect();
refreshAll();
save();
}

function resetRounds(){
const i=Number(ui.select.value);
rounds[i].scores=Array(players.length).fill("");
rounds[i].locked=false;
refreshAll();
save();
}

function resetChips(){
chips=Array(players.length).fill("");
refreshAll();
save();
}

function resetAll(){
localStorage.clear();
location.reload();
}

function updateSelect(){
while(ui.select.firstChild){
ui.select.removeChild(ui.select.firstChild);
}
rounds.forEach((_,i)=>{
const op=document.createElement("option");
op.value=i;
op.textContent=(i+1)+"行目";
ui.select.appendChild(op);
});
}

/* ===== その他 ===== */
function goSetting(){save();location.href="player.html";}
function goHistory(){location.href="history.html";}
function saveHistory(){alert("履歴保存しました");}

</script>
</body>
</html>
