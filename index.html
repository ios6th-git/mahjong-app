<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

/* ===== 上部固定 ===== */
#topFixed{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  padding:6px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

/* ===== ヘッダー ===== */
#fixedHeader table{
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
}

#fixedHeader th{
  border:2px solid #000;
  height:60px;
  font-weight:bold;
}

/* ===== テーブル ===== */
.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  margin-bottom:10px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
}

td{
  border:2px solid #000;
  text-align:center;
  height:60px;
}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:50;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.lockedCell{background:#e6ffe6;}

.rank1 input{background:#ffcccc;}

.totalRow{
  background:#eee;
  font-weight:bold;
}

.rowLine{
  display:flex;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}
</style>
</head>

<body>

<div id="topFixed">
  <div id="playerButtons">
    <button onclick="goSetting()">設定</button>
    <button onclick="saveHistory()">履歴保存</button>
    <button onclick="goHistory()">履歴</button>
  </div>
  <div id="fixedHeader"></div>
</div>

<div class="card">
  <table id="table"></table>
</div>

<div class="card">
  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>
</div>

<script>
const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

/* ===== 保存 ===== */
function saveState(){
  localStorage.setItem("mahjongRounds", JSON.stringify(rounds));
  localStorage.setItem("mahjongChips", JSON.stringify(chips));
}

/* ===== 読込 ===== */
function loadState(){
  rounds = JSON.parse(localStorage.getItem("mahjongRounds")||"[]");
  chips  = JSON.parse(localStorage.getItem("mahjongChips")||"[]");
}

function loadPlayers(){
  players = JSON.parse(localStorage.getItem("mahjongPlayers")||'["","","",""]');
}

/* ===== 初期 ===== */
window.onload=()=>{
  loadState();
  loadPlayers();
  if(rounds.length===0) addRound();
  renderTable();
};

/* ===== ヘッダー ===== */
function renderHeader(){
  const wrap=document.getElementById("fixedHeader");
  wrap.innerHTML="";

  const table=document.createElement("table");
  const tr=document.createElement("tr");

  tr.appendChild(document.createElement("th"));

  players.forEach(p=>{
    const th=document.createElement("th");
    th.textContent=p;
    tr.appendChild(th);
  });

  table.appendChild(tr);
  wrap.appendChild(table);
}

/* ===== メイン描画 ===== */
function renderTable(){
  const table=document.getElementById("table");
  table.innerHTML="";

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");
    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    let max=-Infinity;
    r.scores.forEach(v=>{
      if(v!==""&&v!==NOT_JOIN){
        const n=Number(v);
        if(!isNaN(n)) max=Math.max(max,n);
      }
    });

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.value=(r.scores[i]===NOT_JOIN?"不参加":r.scores[i]);

      if(r.locked){
        td.classList.add("lockedCell");
        inp.disabled=true;
        if(Number(r.scores[i])===max) td.classList.add("rank1");
      }else{
        inp.oninput=e=>{
          r.scores[i]=e.target.value;
          saveState();
        };
      }

      td.appendChild(inp);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  /* ===== 合計 ===== */
  const totalTr=document.createElement("tr");
  totalTr.className="totalRow";

  totalTr.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

  players.forEach((_,i)=>{
    let sum=0;
    rounds.forEach(r=>{
      const v=r.scores[i];
      if(v!==""&&v!==NOT_JOIN){
        const n=Number(v);
        if(!isNaN(n)) sum+=n;
      }
    });
    totalTr.appendChild(Object.assign(document.createElement("td"),{innerText:sum}));
  });

  table.appendChild(totalTr);

  renderHeader();
  adjustPadding();
  setTimeout(syncWidth,0);
}

/* ===== 幅同期 ===== */
function syncWidth(){
  const main=document.getElementById("table");
  const head=document.querySelector("#fixedHeader table");
  if(!main.rows.length) return;

  const m=main.rows[0].cells;
  const h=head.rows[0].cells;

  for(let i=0;i<m.length;i++){
    h[i].style.width=m[i].offsetWidth+"px";
  }
}

/* ===== 高さ補正 ===== */
function adjustPadding(){
  document.body.style.paddingTop =
    document.getElementById("topFixed").offsetHeight+"px";
}

/* ===== 操作 ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill(""),locked:false});
  saveState();
  renderTable();
}

function deleteSelectedRound(){
  const i=Number(roundDeleteList.value);
  if(!confirm("削除？")) return;
  rounds.splice(i,1);
  saveState();
  renderTable();
}

function resetRounds(){
  rounds.forEach(r=>{
    r.scores=Array(players.length).fill("");
    r.locked=false;
  });
  saveState();
  renderTable();
}

function resetChips(){
  chips=Array(players.length).fill("");
  saveState();
}

function resetAll(){
  if(!confirm("全リセット？")) return;
  localStorage.clear();
  location.reload();
}

/* ===== 遷移 ===== */
function goSetting(){window.location.href="player.html";}
function goHistory(){window.location.href="history.html";}
function saveHistory(){alert("履歴保存は未実装");}
</script>

</body>
</html>
