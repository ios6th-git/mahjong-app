<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  font-size:20px;
  background:#f5f5f5;
}

/* ===== 上固定（触らない） ===== */
#topFixed{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#fff;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  padding:6px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px 10px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
}

button:active{transform:scale(0.96);}
.danger{background:#ffebee;color:#d32f2f;}

/* ===== テーブル ===== */
#wrap{
  margin-top:150px;
  height:70vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  border:2px solid #000;
  height:60px;
  text-align:center;
}

/* ヘッダー固定 */
thead th{
  position:sticky;
  top:0;
  background:#fff;
  z-index:5;
}

/* 左固定 */
td:first-child, th:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:6;
}

input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:20px;
}

.nameInput{font-weight:bold;}

.locked{background:#e6ffe6;}
.rank1 input{background:#ffcccc;}

.totalRow{
  background:#eee;
  font-weight:bold;
}

/* ===== 下ボタン（触らない） ===== */
.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  margin:10px;
}

.rowLine{
  display:flex;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}
</style>
</head>

<body>

<div id="topFixed">
  <div id="playerButtons">
    <button onclick="goSetting()">設定</button>
    <button onclick="saveHistory()">履歴保存</button>
    <button onclick="goHistory()">履歴</button>
  </div>
</div>

<div id="wrap">
  <table id="table"></table>
</div>

<div class="card">
  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>
</div>

<script>
const STORAGE_KEYS={
  PLAYERS:"mahjongPlayers",
  CHECKS:"mahjongPlayerChecks_draft",
  ROUNDS:"mahjongRounds"
};

let players=[];
let checks=[];
let rounds=[];
let activeIndex=[];

/* ===== 読込 ===== */
function load(){
  players=JSON.parse(localStorage.getItem(STORAGE_KEYS.PLAYERS)||'["","","",""]');
  checks=JSON.parse(localStorage.getItem(STORAGE_KEYS.CHECKS)||'[true,true,true,true]');
  rounds=JSON.parse(localStorage.getItem(STORAGE_KEYS.ROUNDS)||"[]");

  activeIndex=[];
  checks.forEach((v,i)=>{
    if(v) activeIndex.push(i);
  });
}

/* ===== 保存 ===== */
function savePlayers(){
  localStorage.setItem(STORAGE_KEYS.PLAYERS,JSON.stringify(players));
}

function saveRounds(){
  localStorage.setItem(STORAGE_KEYS.ROUNDS,JSON.stringify(rounds));
}

/* ===== 初期 ===== */
window.onload=()=>{
  load();
  if(rounds.length===0)addRound();
  render();
};

/* ===== 描画 ===== */
function render(){
  const table=document.getElementById("table");
  table.innerHTML="";

  const thead=document.createElement("thead");
  const trh=document.createElement("tr");

  trh.appendChild(document.createElement("th"));

  activeIndex.forEach(i=>{
    const th=document.createElement("th");
    const inp=document.createElement("input");

    inp.value=players[i];
    inp.className="nameInput";

    inp.oninput=e=>{
      players[i]=e.target.value;
      savePlayers();
    };

    th.appendChild(inp);
    trh.appendChild(th);
  });

  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody=document.createElement("tbody");

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");

    tr.appendChild(Object.assign(document.createElement("td"),{innerText:ri+1}));

    let nums=activeIndex.map(i=>Number(r.scores[i]));
    let max=Math.max(...nums.filter(n=>!isNaN(n)));

    activeIndex.forEach(i=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("locked");
        inp.disabled=true;
        if(Number(r.scores[i])===max){
          td.classList.add("rank1");
        }
      }

      inp.value=r.scores[i]||"";

      inp.onfocus=()=>autoFill(ri,i);

      inp.oninput=e=>{
        r.scores[i]=e.target.value;
        saveRounds();
      };

      td.appendChild(inp);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  /* ===== 合計行 ===== */
  const total=document.createElement("tr");
  total.className="totalRow";

  total.appendChild(Object.assign(document.createElement("td"),{innerText:"合計"}));

  activeIndex.forEach(i=>{
    let sum=0;
    rounds.forEach(r=>{
      const n=Number(r.scores[i]);
      if(!isNaN(n)) sum+=n;
    });
    total.appendChild(Object.assign(document.createElement("td"),{innerText:sum}));
  });

  tbody.appendChild(total);

  table.appendChild(tbody);
  updateSelect();
}

/* ===== 自動計算 ===== */
function autoFill(ri,i){
  const r=rounds[ri];
  if(r.locked)return;

  let nums=activeIndex.map(idx=>{
    const n=Number(r.scores[idx]);
    return isNaN(n)?null:n;
  });

  let filled=nums.filter(n=>n!==null).length;

  if(filled===3 && (r.scores[i]===""||r.scores[i]==null)){
    const sum=nums.reduce((a,b)=>a+(b||0),0);
    r.scores[i]=-sum;

    activeIndex.forEach(idx=>{
      if(r.scores[idx]==="") r.scores[idx]="不参加";
    });

    r.locked=true;
    saveRounds();
    render();
  }
}

/* ===== 操作 ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill(""),locked:false});
  saveRounds();
  render();
}

function deleteSelectedRound(){
  const i=Number(roundDeleteList.value);
  if(!confirm("削除？"))return;
  rounds.splice(i,1);
  saveRounds();
  render();
}

function resetRounds(){
  if(!confirm("行リセット？"))return;
  rounds.forEach(r=>{
    r.scores=Array(players.length).fill("");
    r.locked=false;
  });
  saveRounds();
  render();
}

function resetChips(){
  alert("チップ未実装");
}

function resetAll(){
  if(!confirm("点数リセット？"))return;
  localStorage.removeItem(STORAGE_KEYS.ROUNDS);
  rounds=[];
  addRound();
}

function updateSelect(){
  const sel=document.getElementById("roundDeleteList");
  sel.innerHTML="";
  rounds.forEach((_,i)=>{
    const op=document.createElement("option");
    op.value=i;
    op.textContent=(i+1)+"行目";
    sel.appendChild(op);
  });
}

/* ===== 遷移 ===== */
function goSetting(){location.href="player.html";}
function goHistory(){location.href="history.html";}
function saveHistory(){alert("未実装");}
</script>

</body>
</html>
