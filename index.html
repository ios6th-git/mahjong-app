<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  font-size:20px;
  background:#f5f5f5;
}

/* ===== 上固定 ===== */
#topFixed{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#fff;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* ボタン復元 */
#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  padding:6px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px 10px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
}

button:active{transform:scale(0.96);}
.danger{background:#ffebee;color:#d32f2f;}

/* ===== テーブル ===== */
#wrap{
  margin-top:140px;
  height:70vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  border:2px solid #000;
  height:60px;
  text-align:center;
}

/* 上固定（重要） */
thead th{
  position:sticky;
  top:0;
  background:#fff;
  z-index:5;
  font-weight:bold;
}

/* 左固定 */
td:first-child, th:first-child{
  position:sticky;
  left:0;
  background:#fff;
  z-index:6;
}

/* 入力 */
input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:20px;
}

/* 状態 */
.locked{background:#e6ffe6;}
.rank1 input{background:#ffcccc;}

/* ===== 下ボタン復元 ===== */
.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  margin:10px;
}

.rowLine{
  display:flex;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}
</style>
</head>

<body>

<!-- ===== 上固定 ===== -->
<div id="topFixed">
  <div id="playerButtons">
    <button onclick="goSetting()">設定</button>
    <button onclick="saveHistory()">履歴保存</button>
    <button onclick="goHistory()">履歴</button>
  </div>
</div>

<!-- ===== テーブル ===== -->
<div id="wrap">
  <table id="table"></table>
</div>

<!-- ===== 下ボタン完全復元 ===== -->
<div class="card">
  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>
</div>

<script>
const STORAGE_KEYS={
  PLAYERS:"mahjongPlayers",
  ROUNDS:"mahjongRounds"
};

let players=[];
let rounds=[];

function save(){
  localStorage.setItem(STORAGE_KEYS.ROUNDS,JSON.stringify(rounds));
}

function load(){
  players=JSON.parse(localStorage.getItem(STORAGE_KEYS.PLAYERS)||'["A","B","C","D"]');
  rounds=JSON.parse(localStorage.getItem(STORAGE_KEYS.ROUNDS)||"[]");
}

window.onload=()=>{
  load();
  if(rounds.length===0)addRound();
  render();
};

/* ===== 描画 ===== */
function render(){
  const table=document.getElementById("table");
  table.innerHTML="";

  const thead=document.createElement("thead");
  const trh=document.createElement("tr");

  trh.appendChild(document.createElement("th"));

  players.forEach(p=>{
    const th=document.createElement("th");
    th.textContent=p;
    trh.appendChild(th);
  });

  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody=document.createElement("tbody");

  rounds.forEach((r,ri)=>{
    const tr=document.createElement("tr");

    const idx=document.createElement("td");
    idx.textContent=ri+1;
    tr.appendChild(idx);

    let nums=r.scores.map(v=>Number(v));
    let max=Math.max(...nums.filter(n=>!isNaN(n)));

    players.forEach((_,i)=>{
      const td=document.createElement("td");
      const inp=document.createElement("input");

      inp.setAttribute("inputmode","numeric");

      if(r.locked){
        td.classList.add("locked");
        inp.disabled=true;
        if(Number(r.scores[i])===max){
          td.classList.add("rank1");
        }
      }

      inp.value=r.scores[i]||"";

      inp.onfocus=()=>autoFill(ri,i);

      inp.oninput=e=>{
        r.scores[i]=e.target.value;
        save();
      };

      td.appendChild(inp);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  updateSelect();
}

/* ===== 自動計算 ===== */
function autoFill(ri,i){
  const r=rounds[ri];
  if(r.locked)return;

  let nums=r.scores.map(v=>{
    const n=Number(v);
    return isNaN(n)?null:n;
  });

  let filled=nums.filter(n=>n!==null).length;

  if(filled===3 && nums[i]===null){
    const sum=nums.reduce((a,b)=>a+(b||0),0);
    r.scores[i]=-sum;

    for(let k=0;k<players.length;k++){
      if(r.scores[k]==="") r.scores[k]="不参加";
    }

    r.locked=true;
    save();
    render();
  }
}

/* ===== 操作 ===== */
function addRound(){
  rounds.push({scores:Array(players.length).fill(""),locked:false});
  save();
  render();
}

function deleteSelectedRound(){
  const i=Number(roundDeleteList.value);
  if(!confirm("削除？"))return;
  rounds.splice(i,1);
  save();
  render();
}

function resetRounds(){
  if(!confirm("行リセット？"))return;
  rounds.forEach(r=>{
    r.scores=Array(players.length).fill("");
    r.locked=false;
  });
  save();
  render();
}

function resetChips(){
  alert("チップ未実装");
}

function resetAll(){
  if(!confirm("点数リセット？"))return;
  localStorage.removeItem(STORAGE_KEYS.ROUNDS);
  rounds=[];
  addRound();
}

function updateSelect(){
  const sel=document.getElementById("roundDeleteList");
  sel.innerHTML="";
  rounds.forEach((_,i)=>{
    const op=document.createElement("option");
    op.value=i;
    op.textContent=(i+1)+"行目";
    sel.appendChild(op);
  });
}

/* ===== 遷移 ===== */
function goSetting(){location.href="player.html";}
function goHistory(){location.href="history.html";}
function saveHistory(){alert("未実装");}
</script>

</body>
</html>
