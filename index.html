<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>麻雀点数管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-size:20px;
  font-family:sans-serif;
  background:#f5f5f5;
  padding:10px;
}

h3{margin:6px 0 8px;font-size:22px;}

.card{
  background:#fff;
  border-radius:10px;
  padding:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

button{
  font-size:20px;
  min-height:48px;
  padding:4px;
  border:none;
  border-radius:10px;
  background:#e8f5e9;
  color:#2e7d32;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

button:active{transform:scale(0.96);}

.danger{
  background:#ffebee;
  color:#d32f2f;
}

#playerButtons{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-bottom:6px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0;
}

th,td{
  border-right:2px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
}

tr:first-child th{border-top:2px solid #000;}
th:first-child,td:first-child{border-left:2px solid #000;}

#table th,#table td{height:60px;}

th{
  position:static;
  background:#fff;
}

td:first-child{
  position:sticky;
  left:0;
  background:#fff;
}

input{
  width:100%;
  height:100%;
  font-size:20px;
  border:none;
  text-align:center;
}

.nameLocked{
  background:#eee;
  pointer-events:none;
}

td.lockedCell{background:#e6ffe6;}

td.topScore{
  background:#ffcdd2 !important;
}

.rowLine{
  display:flex;
  align-items:center;
  margin-top:6px;
  gap:6px;
}

.left{justify-content:flex-start;}
.right{justify-content:flex-end;}

select{
  font-size:20px;
  min-height:48px;
}
</style>
</head>

<body>

<div id="playerButtons">
  <button onclick="goSetting()">設定</button>
  <button onclick="saveHistory()">履歴保存</button>
  <button onclick="goHistory()">履歴</button>
</div>

<div class="card">
  <h3>点数表</h3>
  <table id="table"></table>
</div>

<div class="card">

  <div class="rowLine left">
    <button onclick="addRound()">行追加</button>
  </div>

  <div class="rowLine right">
    <select id="roundDeleteList"></select>
    <button onclick="deleteSelectedRound()">選択行削除</button>
  </div>

  <div class="rowLine right">
    <button onclick="resetRounds()">行リセット</button>
    <button onclick="resetChips()">チップリセット</button>
  </div>

  <div class="rowLine right">
    <button class="danger" onclick="resetAll()">オールリセット</button>
  </div>

</div>

<script>

const debugBox = document.createElement("div");
debugBox.id = "debugBox";
debugBox.style.position = "fixed";
debugBox.style.bottom = "0";
debugBox.style.right = "0";
debugBox.style.maxHeight = "40%";
debugBox.style.width = "100%";
debugBox.style.overflow = "auto";
debugBox.style.background = "rgba(0,0,0,0.8)";
debugBox.style.color = "#0f0";
debugBox.style.fontSize = "12px";
debugBox.style.zIndex = "9999";
debugBox.style.padding = "4px";
debugBox.style.display = "none";
document.body.appendChild(debugBox);

function debugLog(msg){
  console.error(msg);
  debugBox.style.display = "block";
  const line = document.createElement("div");
  line.textContent = msg;
  debugBox.appendChild(line);
}

window.addEventListener("error", function(e){
  debugLog("JS Error: "+e.message+" @"+e.lineno);
});

window.addEventListener("unhandledrejection", function(e){
  debugLog("Promise Error: "+e.reason);
});

const NOT_JOIN="__NO__";

let players=[];
let rounds=[];
let chips=[];

/* 以降すべて前回コードと同一（省略なしで続く） */
